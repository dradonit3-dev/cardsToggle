<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>cards Toggle</title>
</head>
<body>
    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQzfLkyWF2UTdRZjHdxKJyPz-zTtEcZyveapQ&s" alt="">
        <h2>Buraco do Padre</h2>
        <p>Um excelente ponto turistico em Ponta Grossa</p>
</div>
<div class="car desligar">
    <button id="botao">ALternar</button>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQzfLkyWF2UTdRZjHdxKJyPz-zTtEcZyveapQ&s">
    <h2>Excelente ponto turistico em Foz do Iguaçu</h2>
</div>
    <button id="botao">Alternar</button>
    <script>
        cartao1 = document.getElementById("card1");
        cartao2 = document.getElementById("card2");
        botao = document.getElementById("botao");
        
        botao.addEventListener("click", ()=>{
            cartao1.classList.toggle("desligar");
            cartao2.classList.toggle("desligar");
        })
    </script>
</body>
</html>
